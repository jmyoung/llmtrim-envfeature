name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # aws-lc-rs (pulled in by the interceptor's rustls stack) assembles with NASM on Windows.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Build (release)
        run: cargo build --release
      - name: Compile live feature
        run: cargo build --features live
      # Guard the tokio-free library path Cargo.toml advertises for embedders
      # (`default-features = false` drops the interceptor + tokio).
      - name: Compile embedder core (no default features)
        run: cargo check --no-default-features --lib

  # Gate the AGPL-3.0-only relicensing: fail if any dependency carries a license
  # outside deny.toml's allow-list (e.g. GPL/proprietary) or an unknown source.
  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources

  # Enforced secret scan — the local hooks are opt-in and bypassable (--no-verify);
  # this job catches everyone. fetch-depth: 0 so a secret buried in an earlier commit
  # of a PR branch still fails, not just the tip.
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Homebrew formula must stay valid Ruby (a lowercase class name once broke `brew install`).
  formula:
    name: Formula syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: for f in Formula/*.rb; do ruby -c "$f"; done

  # Guard the advertised MSRV (`rust-version` in Cargo.toml). Stable-only CI can silently
  # adopt a newer-than-1.88 API; this job fails when that happens.
  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets
