name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

# Retry transient crates.io download blips (curl 18 "Transferred a partial file" etc.) instead
# of failing a job outright. Applies to every cargo invocation in the workflow (fetch, build).
env:
  CARGO_NET_RETRY: "10"

jobs:
  # One published GitHub Release per tag, body taken from the matching CHANGELOG.md section.
  # Runs before the build matrix so every binary uploads into a release that already has notes.
  # Use `cargo release patch|minor|major` to cut a release — it handles the version/-dev
  # dance, CHANGELOG section, tag, and push (see release.toml). The guard below makes a
  # hand-rolled tag fail fast instead of shipping a -dev crate or a notes-less release.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Guard — tag matches Cargo.toml and CHANGELOG has the section
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          # Read the shared version from [workspace.package] specifically — a bare
          # `grep '^version='` could pick up an entry under [workspace.dependencies].
          PKG=$(awk -F'"' '/^\[/{s=$0} s=="[workspace.package]" && /^version[[:space:]]*=/{print $2; exit}' Cargo.toml)
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG != Cargo.toml version $PKG (forgot to drop -dev? use cargo release)"; exit 1
          fi
          grep -q "^## \[$TAG\]" CHANGELOG.md || { echo "::error::CHANGELOG.md has no '## [$TAG]' section"; exit 1; }
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          title: llmtrim $version
          token: ${{ secrets.GITHUB_TOKEN }}

  # Generate the third-party license NOTICE exactly once, not per-target. `cargo metadata`
  # returns the full cross-platform dependency set (no --filter-platform), so one run on Linux
  # produces the same union every target needs — running it in all 6 build legs was pure
  # redundancy that multiplied the flake surface. `cargo fetch --locked` warms the cache so the
  # generator (now `--offline`) is network-free; the build legs consume the result as an artifact.
  license-notice:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      # Pin the toolchain like every other rust job (publish-crate etc.) instead of relying on
      # the runner image happening to preinstall cargo.
      - uses: dtolnay/rust-toolchain@stable
      - name: Warm the cargo cache (the only network step here)
        run: cargo fetch --locked
      - name: Generate third-party license notice
        run: python3 tools/gen_third_party_licenses.py
      - uses: actions/upload-artifact@v7
        with:
          name: third-party-licenses
          path: THIRD-PARTY-LICENSES.md
          if-no-files-found: error

  build:
    needs: [create-release, license-notice]
    name: ${{ matrix.target }}
    permissions:
      contents: write
      id-token: write       # mint the OIDC token for build-provenance attestation
      attestations: write   # write the attestation back to the repo
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      # aws-lc-rs assembles its x86 asm with NASM. Only x86_64 Windows needs it; the ARM64
      # runner uses a different assembler, and no arm64 NASM build exists.
      - name: Install NASM (Windows x64)
        if: runner.os == 'Windows' && runner.arch == 'X64'
        uses: ilammy/setup-nasm@v1
      # The NOTICE is generated once in the `license-notice` job (the same union for every
      # target) and pulled in here, so the archive can bundle it via `include` below.
      - uses: actions/download-artifact@v8
        with:
          name: third-party-licenses
          path: .
      # Cross-compiles, strips, archives as llmtrim-<target>.tar.gz (.zip on Windows) with a
      # matching .sha256, and uploads to the GitHub Release for this tag. The archive name
      # matches what install.sh and install.ps1 download. `include` bundles LICENSE + NOTICE.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: llmtrim
          target: ${{ matrix.target }}
          archive: llmtrim-$target
          checksum: sha256
          include: LICENSE,THIRD-PARTY-LICENSES.md
          token: ${{ secrets.GITHUB_TOKEN }}
      # SLSA build provenance for the compiled binary — users verify with
      # `gh attestation verify <binary> --repo fkiene/llmtrim`.
      # upload-rust-binary-action builds under target/<triple>/release, except when the host
      # triple equals the target (native aarch64-windows) it can skip --target and emit to
      # target/release. Resolve whichever exists so attestation never misses the subject
      # (an intermittent "Could not find subject at path" on the arm64-windows runner).
      - name: Locate the built binary
        id: bin
        shell: bash
        run: |
          name="llmtrim${{ runner.os == 'Windows' && '.exe' || '' }}"
          for p in "target/${{ matrix.target }}/release/$name" "target/release/$name"; do
            [ -f "$p" ] && { echo "path=$p" >> "$GITHUB_OUTPUT"; echo "found $p"; exit 0; }
          done
          echo "no built binary found for ${{ matrix.target }}" >&2; exit 1
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.bin.outputs.path }}

  # The release verifies itself: run the real installers against the assets just uploaded,
  # on the same three OSes users have. LLMTRIM_VERSION pins to this tag so the test can't
  # race `releases/latest`. Catches what unit tests can't: asset naming, checksum sidecars,
  # archive layout, PowerShell/dash quirks.
  verify-install:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      LLMTRIM_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - name: install.sh end-to-end
        if: runner.os != 'Windows'
        run: |
          sh install.sh
          "$HOME/.local/bin/llmtrim" --version
          "$HOME/.local/bin/llmtrim" doctor || true   # diagnostic snapshot, not a gate in CI
      - name: install.ps1 end-to-end
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./install.ps1
          if ($LASTEXITCODE -ne 0) { exit 1 }
          $exe = Join-Path $env:LOCALAPPDATA 'llmtrim\bin\llmtrim.exe'
          & $exe --version
          if ($LASTEXITCODE -ne 0) { exit 1 }

  # Publish to crates.io so `cargo install llmtrim` works (not just --git). Uses Trusted
  # Publishing (OIDC): the auth action exchanges this job's GitHub identity for a
  # short-lived publish token — no long-lived secret. Configured at crates.io → llmtrim →
  # Settings → Trusted Publishing (repo fkiene/llmtrim, workflow release.yml).
  publish-crate:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token the auth action exchanges
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      # publish's verify build runs under target/package/ and cargo config discovery walks
      # UP into the repo — a committed .cargo/ (e.g. a local linker setting) would poison
      # it even when excluded from the package (broke v0.1.2 and v0.1.3).
      - run: rm -rf .cargo
      # Two crates now: the engine library (llmtrim-core) must land on the index before the
      # CLI (llmtrim), which depends on it by version. Publish core, wait for it to be
      # served, then publish the CLI. Both must have Trusted Publishing configured on
      # crates.io (repo fkiene/llmtrim, workflow release.yml).
      - name: Publish llmtrim-core, then llmtrim
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          cargo publish -p llmtrim-core
          # Poll the sparse index (stable, machine-readable) — not `cargo search`, whose
          # output format isn't a contract — until core's new version is served.
          for i in $(seq 1 20); do
            if curl -fsSL "https://index.crates.io/ll/mt/llmtrim-core" | grep -q "\"vers\":\"$V\""; then break; fi
            [ "$i" = 20 ] && { echo "::error::llmtrim-core $V never appeared on the index"; exit 1; }
            echo "waiting for llmtrim-core $V on the index (attempt $i)"; sleep 30
          done
          cargo publish -p llmtrim

  # Multi-arch proxy image on GHCR from the released (attested) binaries — not rebuilt.
  # amd64 ← x86_64-musl (fully static), arm64 ← aarch64-gnu (distroless cc has glibc).
  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Stage released binaries per arch
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p binaries/amd64 binaries/arm64
          gh release download "$TAG" -p 'llmtrim-x86_64-unknown-linux-musl.tar.gz' -O - | tar -xz -C binaries/amd64 llmtrim
          gh release download "$TAG" -p 'llmtrim-aarch64-unknown-linux-gnu.tar.gz' -O - | tar -xz -C binaries/arm64 llmtrim
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/fkiene/llmtrim:latest
            ghcr.io/fkiene/llmtrim:${{ github.ref_name }}

  # Scoop manifest in fkiene/scoop-bucket (`scoop bucket add llmtrim
  # https://github.com/fkiene/scoop-bucket && scoop install llmtrim`). Same PAT as the tap.
  bump-scoop:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update bucket manifest
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          V="${TAG#v}"
          base="https://github.com/fkiene/llmtrim/releases/download/${TAG}"
          sha() { curl -fsSL "$base/llmtrim-$1.sha256" | cut -d' ' -f1; }
          X64SHA=$(sha x86_64-pc-windows-msvc) A64SHA=$(sha aarch64-pc-windows-msvc)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/fkiene/scoop-bucket.git" bucket
          mkdir -p bucket/bucket
          cat > bucket/bucket/llmtrim.json <<EOF
          {
              "version": "$V",
              "description": "Cut your LLM bill: drop-in proxy that compresses input, output, and cache",
              "homepage": "https://github.com/fkiene/llmtrim",
              "license": "MPL-2.0",
              "architecture": {
                  "64bit": {
                      "url": "$base/llmtrim-x86_64-pc-windows-msvc.zip",
                      "hash": "$X64SHA"
                  },
                  "arm64": {
                      "url": "$base/llmtrim-aarch64-pc-windows-msvc.zip",
                      "hash": "$A64SHA"
                  }
              },
              "bin": "llmtrim.exe",
              "checkver": { "github": "https://github.com/fkiene/llmtrim" },
              "autoupdate": {
                  "architecture": {
                      "64bit": { "url": "https://github.com/fkiene/llmtrim/releases/download/v\$version/llmtrim-x86_64-pc-windows-msvc.zip" },
                      "arm64": { "url": "https://github.com/fkiene/llmtrim/releases/download/v\$version/llmtrim-aarch64-pc-windows-msvc.zip" }
                  },
                  "hash": { "url": "\$url.sha256", "regex": "^([a-fA-F0-9]{64})" }
              }
          }
          EOF
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/llmtrim.json
          git commit -m "llmtrim $V" || { echo "manifest already current"; exit 0; }
          git push origin main

  # npm: meta package `llmtrim` + per-platform binary packages (esbuild pattern).
  # Skipped while the NPM_TOKEN secret is absent.
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Build and publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$NODE_AUTH_TOKEN" ]; then echo "NPM_TOKEN not set — skipping npm publish"; exit 0; fi
          mkdir -p assets
          for t in x86_64-unknown-linux-musl aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin; do
            mkdir -p "assets/$t"
            gh release download "$TAG" -p "llmtrim-$t.tar.gz" -O - | tar -xz -C "assets/$t" llmtrim
          done
          for t in x86_64-pc-windows-msvc aarch64-pc-windows-msvc; do
            mkdir -p "assets/$t"
            gh release download "$TAG" -p "llmtrim-$t.zip" -O "/tmp/$t.zip"
            unzip -j -o "/tmp/$t.zip" llmtrim.exe -d "assets/$t"
          done
          sh tools/npm/build_npm_packages.sh "$TAG" assets out
          # Platform packages first so the meta package's optionalDependencies resolve.
          # NOTE the ./ prefix: a bare `a/b` argument is npm's GitHub-repo shorthand.
          for d in out/*; do [ "$d" = "out/cli" ] && continue; npm publish "./$d" --access public; done
          npm publish ./out/cli --access public
          # Verify the channel like the others: install from the registry and run it.
          sleep 30
          npm install -g "@llmtrim/cli@${TAG#v}"
          llmtrim --version | grep -F "${TAG#v}"

  # npm: the WebAssembly binding, built with wasm-pack (which manages a matching wasm-bindgen
  # internally). Published as `@llmtrim/js` (primary) plus `@llmtrim/wasm` (a thin alias that
  # re-exports it). Independent of the crate/CLI release — a wasm publish failure must not
  # block them — and skipped while NPM_TOKEN is absent.
  publish-wasm:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          # Pinned so the bundled wasm-bindgen stays fixed; the CI `wasm` job derives its
          # wasm-bindgen-cli from Cargo.lock, so keep both in step when bumping either.
          tool: wasm-pack@0.13.1
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Build and publish @llmtrim/js (+ @llmtrim/wasm alias)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG: ${{ github.ref_name }}
          # The JS-backed getrandom backend needs this rustc cfg; it can't live in a repo
          # .cargo/config.toml (that would break `cargo publish`'s verify build).
          RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'
        run: |
          set -euo pipefail
          if [ -z "$NODE_AUTH_TOKEN" ]; then echo "NPM_TOKEN not set — skipping wasm npm publish"; exit 0; fi
          VER="${TAG#v}"
          wasm-pack build crates/llmtrim-wasm --release --target bundler --out-dir pkg
          # Smoke the bundler artifact actually being published (the CI `wasm` job builds the
          # nodejs target, a different codepath): the expected files exist and the wasm parses
          # and exports `compress`.
          node -e '
            const fs = require("fs"), d = "crates/llmtrim-wasm/pkg/";
            for (const f of ["llmtrim_wasm_bg.wasm", "llmtrim_wasm.js", "llmtrim_wasm.d.ts", "package.json"])
              if (!fs.existsSync(d + f)) throw new Error("missing " + f);
            const ex = WebAssembly.Module.exports(new WebAssembly.Module(fs.readFileSync(d + "llmtrim_wasm_bg.wasm")));
            if (!ex.some(e => e.name.includes("compress"))) throw new Error("compress not exported by wasm");
            console.log("bundler artifact OK");
          '
          # wasm-pack names the package after the crate (llmtrim-wasm); scope it to @llmtrim/js
          # and pin the released version.
          node -e '
            const fs = require("fs"), p = "crates/llmtrim-wasm/pkg/package.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.name = "@llmtrim/js";
            j.version = process.env.TAG.replace(/^v/, "");
            j.keywords = ["llm", "tokens", "compression", "proxy", "openai", "anthropic", "claude", "wasm", "webassembly"];
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '
          npm publish crates/llmtrim-wasm/pkg --access public
          # Thin alias package: @llmtrim/wasm re-exports @llmtrim/js at the same version.
          mkdir -p alias
          cat > alias/package.json <<JSON
          {
            "name": "@llmtrim/wasm",
            "version": "$VER",
            "description": "Alias for @llmtrim/js, the llmtrim WebAssembly binding.",
            "keywords": ["llm", "tokens", "compression", "proxy", "openai", "anthropic", "claude", "wasm", "webassembly"],
            "license": "MPL-2.0",
            "homepage": "https://github.com/fkiene/llmtrim",
            "repository": { "type": "git", "url": "https://github.com/fkiene/llmtrim" },
            "type": "module",
            "main": "index.js",
            "module": "index.js",
            "types": "index.d.ts",
            "dependencies": { "@llmtrim/js": "$VER" }
          }
          JSON
          echo 'export * from "@llmtrim/js";' > alias/index.js
          echo 'export * from "@llmtrim/js";' > alias/index.d.ts
          cat > alias/README.md <<'MD'
          # @llmtrim/wasm

          Alias for [`@llmtrim/js`](https://www.npmjs.com/package/@llmtrim/js) — the
          WebAssembly/JS binding for the [llmtrim](https://github.com/fkiene/llmtrim)
          compression engine. Installing this package pulls in `@llmtrim/js` at the same
          version and re-exports it, so both names resolve to the identical API.

          ```js
          import { compress } from "@llmtrim/wasm"; // same as "@llmtrim/js"
          ```

          See the [`@llmtrim/js` README](https://www.npmjs.com/package/@llmtrim/js) for the
          full API and usage.
          MD
          npm publish ./alias --access public
          # Verify both channels resolve from the registry.
          sleep 30
          npm view "@llmtrim/js@$VER" version
          npm view "@llmtrim/wasm@$VER" version

  # Self-verify the cargo channel: install from the real crates.io index, exactly as a
  # user would. Retries because the index propagates with a small delay after publish.
  verify-crate:
    needs: publish-crate
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo install from crates.io
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 20); do
            if cargo install --locked llmtrim --version "$V"; then break; fi
            [ "$i" = 20 ] && { echo "::error::crates.io never served $V"; exit 1; }
            echo "index not ready yet (attempt $i), retrying in 30s"; sleep 30
          done
          "$HOME/.cargo/bin/llmtrim" --version | grep -F "$V"

  # Bump the Homebrew tap (fkiene/homebrew-tap) to this tag: rewrites url + sha256 in the
  # formula. Build-from-source, so the download URL is the git source tarball. Plain
  # script (mislav/bump-homebrew-formula-action kept failing with HTTP 303 on this URL).
  # Needs a PAT with write access to the tap repo in the HOMEBREW_TAP_TOKEN secret.
  bump-homebrew:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      # Need the repo's Formula/llmtrim.rb — it's the source of truth (incl. the
      # workspace-aware install method); the tap is just a stamped mirror of it.
      - uses: actions/checkout@v7
      - name: Sync + stamp the tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          URL="https://github.com/fkiene/llmtrim/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/fkiene/homebrew-tap.git" tap
          # Copy the repo formula into the tap (carries the install method + any formula
          # change), then stamp this release's url + sha256.
          cp Formula/llmtrim.rb tap/Formula/llmtrim.rb
          cd tap
          sed -i -E "s|^(  url \").*(\")$|\1${URL}\2|" Formula/llmtrim.rb
          sed -i -E "s|^(  sha256 \").*(\")$|\1${SHA}\2|" Formula/llmtrim.rb
          ruby -c Formula/llmtrim.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "llmtrim ${TAG#v}" || { echo "formula already current"; exit 0; }
          git push origin main

  # Self-verify the Homebrew channel: tap + build-from-source install on a real Mac,
  # exactly as a user would. Also proves the sha256 the bump script just wrote.
  verify-brew:
    needs: bump-homebrew
    runs-on: macos-latest
    steps:
      - name: brew install from the tap
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          brew tap fkiene/tap
          brew install --build-from-source fkiene/tap/llmtrim
          llmtrim --version | grep -F "$V"
