# Isolation config for benching the toolout stage alone: every other stage off, so the
# measured savings + quality delta are attributable to tool-output compression only.
# CCR off → plain `[… N lines omitted …]` markers (the retrieval round-trip isn't wired,
# so this measures the windowing quality, not retrieval).
hygiene = false
serialize = false
dedup = false
ngram = false
tool_select = false
tool_trim_desc = false
output_control = false
cache = false
retrieve = false
skeletonize = false
minify_code = false
multimodal = false
auto = false

toolout = true
toolout_max_lines = 40
toolout_min_lines = 20
toolout_template = true
toolout_mode = "adaptive"
