[package]
name = "llmtrim-tray"
description = "System-tray app showing per-agent compression savings (macOS + Windows)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
license.workspace = true
publish = false

[[bin]]
name = "llmtrim-tray"
path = "src/main.rs"

[dependencies]
llmtrim-ledger = { path = "../llmtrim-ledger", version = "0.4.1-dev" }
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-positioner = { version = "2", features = ["tray-icon"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }

# Tauri macro-generated scaffolding contains `unsafe` blocks, so this crate cannot
# inherit the workspace `unsafe_code = "forbid"`. Re-declare lints here without it,
# mirroring crates/llmtrim-uniffi/Cargo.toml.
[lints.rust]
warnings = "deny"
