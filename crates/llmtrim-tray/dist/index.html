<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>llmtrim</title>
    <!--
      CSP lives in tauri.conf.json (security.csp): script-src 'self', connect-src 'none'.
      Vite emits the bundle as an external `<script type="module" src>` below — no inline
      script, no remote origin. Fonts use the system stack, so nothing is fetched.
    -->
    <script type="module" crossorigin src="./assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
