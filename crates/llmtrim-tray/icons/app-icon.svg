<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- App / installer / dock icon: the green brand square with the white
       compress-arrows mark. Distinct from the monochrome menu-bar tray glyph
       (icons/tray.svg). Rasterised by tools/gen_icons.py into the PNG/ico/icns
       set referenced by tauri.conf.json `bundle.icon`. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e0a1"/>
      <stop offset="1" stop-color="#1fbf8a"/>
    </linearGradient>
  </defs>
  <rect x="112" y="112" width="800" height="800" rx="184" fill="url(#g)"/>
  <g transform="translate(320,320) scale(16)" fill="none" stroke="#ffffff"
     stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="4" x2="12" y2="20"/>
    <path d="M3 12 H9"/>
    <path d="M6 9 L9 12 L6 15"/>
    <path d="M21 12 H15"/>
    <path d="M18 9 L15 12 L18 15"/>
  </g>
</svg>
