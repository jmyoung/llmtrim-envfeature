# cargo-deny config — license + advisory gate for llmtrim (MPL-2.0).
# Run: cargo deny check            (all sections)
#      cargo deny check licenses   (license compatibility only)
# Install: cargo install cargo-deny --locked
#
# Rule: every dependency must be permissive or weak-copyleft (MPL-2.0).
# A new dep under GPL-2.0-only / GPL-3.0 / AGPL / proprietary fails the build,
# protecting llmtrim's MPL-2.0 licensing.

[graph]
# Evaluate every target so a platform-specific dep can't smuggle in a bad license.
all-features = true

[licenses]
# Deny-by-default: only the SPDX ids below are allowed. Anything else fails.
# confidence-threshold: how sure the SPDX scanner must be (0.8 = standard).
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "BSL-1.0", # Boost — permissive
  "0BSD",
  "CC0-1.0", # public-domain dedication
  "MIT-0",
  "Unicode-3.0", # unicode-ident data
  "Unlicense",
  "CDLA-Permissive-2.0", # webpki-roots cert data
  "MPL-2.0", # weak copyleft (file-level) — our own crates + transitive deps
  "OpenSSL", # ring/aws-lc transitive, permissive
]
# fuchsia-cprng (transitive via gaoya→random_choice→rand, fuchsia-target only) has no
# `license` field in its manifest — only a BSD-3-Clause LICENSE file. Clarify keeps the
# run warning-clean. The hash is XxHash32 of that LICENSE (cargo-deny's checksum); if the
# crate version ever bumps, cargo-deny warns again and the hash must be recomputed.
[[licenses.clarify]]
name = "fuchsia-cprng"
expression = "BSD-3-Clause"
license-files = [{ path = "LICENSE", hash = 0xf04ece33 }]

[bans]
# Surface accidental duplicate-version bloat; warn, don't fail.
multiple-versions = "warn"

[advisories]
# RUSTSEC vulnerability + yanked-crate gate. Uncomment ignores only with a
# tracked justification.
yanked = "warn"
# ignore = ["RUSTSEC-0000-0000"]

[sources]
# Only crates.io. Any git/registry source not listed fails — blocks a typo-squat
# or unreviewed fork from entering the tree.
unknown-registry = "deny"
unknown-git = "deny"
