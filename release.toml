# cargo-release config — `cargo release patch|minor|major` is the one release command.
# It: moves CHANGELOG [Unreleased] to the new version, drops -dev, commits, tags
# v{{version}}, pushes (workflow takes over: binaries, crates.io via OIDC, tap bump),
# then bumps main to the next -dev version. Install: cargo install cargo-release --locked
allow-branch = ["main"]
# Hard gate: HEAD must be pushed and every CI check on it green before anything is
# committed or tagged (needs `gh` authenticated).
pre-release-hook = ["sh", "tools/check_ci_green.sh"]
publish = false      # crates.io publish happens in release.yml via Trusted Publishing
verify = false       # CI is the verifier; keep the release command fast
push = true
tag-name = "v{{version}}"
pre-release-commit-message = "release: v{{version}}"
# cargo-release 1.x dropped the built-in dev-version bump; after a release, run:
#   cargo release version <next>-dev -x && git commit -am "chore: main is <next>-dev" && git push

# CHANGELOG: stamp the released section and re-seed [Unreleased] + link refs.
pre-release-replacements = [
  { file = "CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}", exactly = 1 },
  # $1 captures the previous release tag from the existing link — {{prev_version}} would
  # give the -dev version, producing a bogus compare URL.
  { file = "CHANGELOG.md", search = "\\[Unreleased\\]: https://github.com/fkiene/llmtrim/compare/(v[0-9.]+)\\.\\.\\.HEAD", replace = "[Unreleased]: https://github.com/fkiene/llmtrim/compare/v{{version}}...HEAD\n[{{version}}]: https://github.com/fkiene/llmtrim/compare/${1}...v{{version}}", exactly = 1 },
]
