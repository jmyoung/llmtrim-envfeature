# cargo-release config — `cargo release patch|minor|major` is the one release command.
# It: moves CHANGELOG [Unreleased] to the new version, drops -dev, commits, tags
# v{{version}}, pushes (workflow takes over: binaries, crates.io via OIDC, tap bump),
# then bumps main to the next -dev version. Install: cargo install cargo-release --locked
allow-branch = ["main"]
# Workspace split: llmtrim-core + llmtrim share one version (via [workspace.package]) and
# release together under a single tag + commit. shared-version keeps every member — and the
# internal `llmtrim-core` version requirement in llmtrim's Cargo.toml — in lockstep;
# consolidate-commits collapses the per-crate commits into one (a single shared tag-name
# template likewise yields one tag). llmtrim-uniffi has `publish = false` in its manifest,
# so cargo-release skips publishing it. The CHANGELOG stamp lives in llmtrim-core's
# [package.metadata.release] (pointing at the root CHANGELOG) so it runs exactly once
# instead of once per crate.
shared-version = true
consolidate-commits = true
# Hard gate: HEAD must be pushed and every CI check on it green before anything is
# committed or tagged (needs `gh` authenticated). The hook runs from each member's
# directory (crates/<name>/), so the path is workspace-root-relative; the script itself
# is cwd-agnostic (git/gh resolve the repo from any subdir).
pre-release-hook = ["sh", "../../tools/check_ci_green.sh"]
publish = false # crates.io publish happens in release.yml via Trusted Publishing
verify = false # CI is the verifier; keep the release command fast
push = true
tag-name = "v{{version}}"
pre-release-commit-message = "release: v{{version}}"
# cargo-release 1.x dropped the built-in dev-version bump; after a release, run:
#   cargo release version <next>-dev -x && git commit -am "chore: main is <next>-dev" && git push
#
# The CHANGELOG replacements that stamp the released section live in
# crates/llmtrim-core/Cargo.toml [package.metadata.release], targeting ../../CHANGELOG.md,
# so they fire once (on the core crate) rather than once per workspace member.
